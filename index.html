function renderReady() {
  const meals = db.readyMeals.filter(m => m.week === viewWeek);
  const proteinCount = meals.filter(m => m.category === 'Protein').length;
  const fibreCount = meals.filter(m => m.category === 'Fibre').length;
  const carbsCount = meals.filter(m => m.category === 'Carbs').length;
  const fullMealCount = meals.filter(m => m.category === 'Full Meal').length;

  let html = `<div class="section">
    <div class="stats-bar">
      <div class="stat-cell"><div class="stat-val" style="color:${proteinCount ? 'var(--green-primary)' : 'var(--text-muted)'}">${proteinCount}</div><div class="stat-lbl">Protein</div></div>
      <div class="stat-cell"><div class="stat-val" style="color:${fibreCount ? 'var(--green-primary)' : 'var(--text-muted)'}">${fibreCount}</div><div class="stat-lbl">Fibre</div></div>
      <div class="stat-cell"><div class="stat-val" style="color:${carbsCount ? 'var(--green-primary)' : 'var(--text-muted)'}">${carbsCount}</div><div class="stat-lbl">Carbs</div></div>
      <div class="stat-cell"><div class="stat-val" style="color:${fullMealCount ? 'var(--green-primary)' : 'var(--text-muted)'}">${fullMealCount}</div><div class="stat-lbl">Full Meal</div></div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
      <button class="btn-primary btn-primary-sm" onclick="openReadyModal()">+ Add Meal</button>
    </div>
  </div>`;

  if (meals.length === 0) {
    html += `<div style="padding:50px 20px;text-align:center;color:var(--text-muted)">
      <div style="margin-bottom:10px;line-height:0;display:flex;justify-content:center">${ICO_BOWL_LG}</div>
      <div style="font-size:14px">No ready meals yet.<br>Add your cooked batches here.</div>
    </div>`;
  } else {
    html += `<div style="padding:0 14px 14px">`;
    sortReadyMeals(meals).forEach(m => {
      const eatByDays = m.eatBy ? daysUntilExpiry(m.eatBy) : null;
      let eatByStr = m.eatBy ? `Eat by ${fmtDate(m.eatBy)}` : '';
      let eatByStyle = '';
      if (eatByDays !== null && eatByDays < 0) { eatByStyle = 'color:var(--red-dark);font-weight:600'; eatByStr = `Expired (${fmtDate(m.eatBy)})`; }
      else if (eatByDays !== null && eatByDays <= 3) { eatByStyle = 'color:var(--amber);font-weight:600'; }
      const nameDisplay = `${m.isLeftover ? '* ' : ''}${escHtml(m.name)}`;
      const did = m.dishId || dishIdByName(m.name);

      html += `<div class="ready-card">
        <div class="ready-card-top">
          <div class="item-main">
            <div class="item-name name-link" onclick="openReadyDetail(${m.id})">${nameDisplay}</div>
          </div>
          <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
            ${delBtn('ready', m.id)}
            <button class="btn-icon ico" onclick="openReadyModal(${m.id})">${ICO_EDIT}</button>
          </div>
        </div>
        <div class="ready-card-body">
          <div class="ready-card-meta">
            ${eatByStr ? `<div style="font-size:11px;${eatByStyle};width:100%">${eatByStr}</div>` : ''}
            <div style="display:flex;gap:4px;flex-wrap:wrap">
              ${m.category ? catBadge(m.category) : ''}
              ${locBadge(m.loc)}
            </div>
          </div>
          <div class="ready-card-actions">
            ${carriedToggleHtml(m.id, m.carried)}
            <div class="serving-counter">
              <button class="counter-btn" onclick="adjReadyServings(${m.id},-1)">−</button>
              <input class="counter-val" type="number" min="0" id="ready-sv-${m.id}" value="${m.servings}" onchange="setReadyServings(${m.id},this.value)" onblur="setReadyServings(${m.id},this.value)">
              <button class="counter-btn" onclick="adjReadyServings(${m.id},1)">+</button>
            </div>
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  return html;
}

// Read-only detail view for a ready meal. Opens as a bottom sheet modal.
// Shows all metadata in a clean label/value table layout.
// Edit button is in the topbar (consistent with dish detail and pantry peek).
// ✕ (SVG close icon) closes the modal entirely.
function openReadyDetail(id) {
  const m = db.readyMeals.find(x => x.id === id);
  if (!m) return;
  const eatByDays = m.eatBy ? daysUntilExpiry(m.eatBy) : null;
  let eatByStyle = '';
  if (eatByDays !== null && eatByDays < 0) eatByStyle = 'color:var(--red-dark);font-weight:600';
  else if (eatByDays !== null && eatByDays <= 3) eatByStyle = 'color:var(--amber);font-weight:600';

  function row(label, value) {
    if (!value) return '';
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.6px">${label}</span>
      <span style="font-size:14px;text-align:right">${value}</span>
    </div>`;
  }

  openModal(`
    <div class="modal-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>${m.isLeftover ? '<span class="badge badge-orange" style="margin-right:6px;vertical-align:middle">* leftover</span>' : ''}${escHtml(m.name)}</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn-icon ico" onclick="openReadyModal(${id})" title="Edit">${ICO_EDIT}</button>
        <button class="btn-icon ico-muted" onclick="closeModal()">${ICO_CLOSE}</button>
      </div>
    </div>
    <div style="margin-bottom:16px;height:70vh;overflow-y:auto">
      ${row('Week to eat', fmtDateFull(m.week))}
      ${row('Category', m.category ? `<span class="badge badge-${({Protein:'protein',Fibre:'fibre',Carbs:'carbs','Full Meal':'fullmeal'}[m.category]||'grey')}">${m.category}</span>` : '')}
      ${row('Location', `<span class="badge ${({Fridge:'badge-fridge',Freezer:'badge-freezer',Pantry:'badge-pantry'}[m.loc]||'badge-grey')}">${m.loc}</span>`)}
      ${row('Servings', String(m.servings))}
      ${row('Date cooked', m.cooked ? fmtDateFull(m.cooked) : '')}
      ${m.eatBy ? `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.6px">Eat by</span>
        <span style="font-size:14px;${eatByStyle}">${fmtDateFull(m.eatBy)}</span>
      </div>` : ''}
      ${row('Note', m.note ? escHtml(m.note) : '-')}
    </div>
  `);
}

function adjReadyServings(id, delta) {
  const m = db.readyMeals.find(x => x.id === id);
  if (!m) return;
  const inputEl = document.getElementById('ready-sv-' + id);
  const current = inputEl ? (parseInt(inputEl.value) || 0) : (m.servings || 0);
  m.servings = Math.max(0, current + delta);
  saveData();
  render();
}

function setReadyServings(id, val) {
  const m = db.readyMeals.find(x => x.id === Number(id));
  if (!m) return;
  const n = parseInt(val);
  if (!isNaN(n) && n >= 0) m.servings = n;
  saveData();
  render();
}

function prefillReadyServings(name) {
  const wd = getWeekData(viewWeek);
  const dish = db.dishes.find(d => d.name.toLowerCase() === name.toLowerCase() && wd.selectedDishes.includes(d.id));
  if (dish) {
    const servingsInput = document.getElementById('rm-servings');
    if (servingsInput) servingsInput.value = getDishServings(dish.id, viewWeek);
  }
}

function handleRmNameChange(input) {
  const val = input.value;
  if (val.endsWith('*')) {
    input.value = val.slice(0, -1).trim();
    const servingsInput = document.getElementById('rm-servings');
    if (servingsInput) servingsInput.value = 1;
    const eatByInput = document.getElementById('rm-eatby');
    if (eatByInput) {
      const eatByDate = new Date(viewWeek + 'T00:00:00');
      eatByDate.setDate(eatByDate.getDate() + 3);
      eatByInput.value = localStr(eatByDate);
    }
    // Preserve original cook date from the carried meal
    const strippedName = input.value.toLowerCase();
    const originalMeal = db.readyMeals.find(r =>
      r.name.toLowerCase() === strippedName && r.week === addWks(viewWeek, -1)
    );
    const cookedInput = document.getElementById('rm-cooked');
    if (cookedInput && originalMeal?.cooked) cookedInput.value = originalMeal.cooked;
    rmIsLeftover = true;
    // Update modal title to show leftover badge dynamically
    const titleEl = document.getElementById('rm-modal-title');
    if (titleEl && !titleEl.querySelector('.badge-orange')) {
      titleEl.insertAdjacentHTML('beforeend', '<span class="badge badge-orange" style="margin-left:8px;vertical-align:middle">* leftover</span>');
    }
  } else {
    rmIsLeftover = false;
    // Remove leftover badge if user switches to a non-carried dish
    const titleEl = document.getElementById('rm-modal-title');
    const badge = titleEl?.querySelector('.badge-orange');
    if (badge) badge.remove();
    prefillReadyServings(val);
  }
}

function showRmSuggestions() {
  renderRmSuggestions(rmSuggestions);
}

function filterRmSuggestions(val) {
  if (rmSelecting) { rmSelecting = false; return; }
  const container = document.getElementById('rm-suggestions');
  if (!container) return;
  const q = val.trim().toLowerCase();
  const filtered = q ? rmSuggestions.filter(s => s.name.toLowerCase().includes(q)) : rmSuggestions;
  renderRmSuggestions(filtered);
}

function renderRmSuggestions(list) {
  const container = document.getElementById('rm-suggestions');
  if (!container) return;
  if (list.length === 0) {
    container.classList.add('hidden');
    return;
  }
  container.innerHTML = list.map(s =>
    `<div class="rm-suggestion-row${s.isCarried ? ' carried' : ''}" onmousedown="selectRmSuggestion('${escHtml(s.name)}',${s.isCarried})">${s.isCarried ? '* ' : ''}${escHtml(s.name)}</div>`
  ).join('');
  container.classList.remove('hidden');
}

function selectRmSuggestion(name, isCarried) {
  const input = document.getElementById('rm-name');
  if (!input) return;
  rmSelecting = true;
  input.value = isCarried ? name + '*' : name;
  handleRmNameChange(input);
  hideRmSuggestions();
}

function hideRmSuggestions() {
  const container = document.getElementById('rm-suggestions');
  if (container) container.classList.add('hidden');
}

let rmOutsideClickListener = null;

// ── READY MEALS MODAL ──────────────────────────────
// The Dish Name field uses a custom dropdown (not native datalist) for full control
// over ordering and styling. Suggestion sources:
//   1. Carried meals from prior week (meal.week === viewWeek - 1 week, carried === true)
//      — shown first with * prefix and amber styling
//   2. Cook plan dishes for the viewed week (db.weeks[viewWeek].selectedDishes)
//      — shown after carried, deduped so a carried dish doesn't appear twice
// On selecting a carried suggestion, handleRmNameChange:
//   — strips * from the name
//   — sets servings to 1
//   — sets eat-by to viewWeek + 3 days
//   — copies cook date from the original carried meal
//   — sets rmIsLeftover = true (saved to record on saveReady)
//   — injects the * leftover badge into the modal title
// rmSelecting flag suppresses oninput re-filtering after selectRmSuggestion sets input.value.
// Outside-tap listener (click + touchstart) dismisses the dropdown; cleaned up on closeModal.
function openReadyModal(id) {
  rmIsLeftover = false;
  const m = id ? db.readyMeals.find(x => x.id === id) : null;
  const locs = ['Fridge', 'Freezer', 'Pantry'];
  const today = localStr(new Date());
  const defaultCooked = m ? (m.cooked || today) : viewWeek;

  // Build dish name suggestions from current week's selected dishes
  const wd = getWeekData(viewWeek);
  const weekDishNames = db.dishes
    .filter(d => wd.selectedDishes.includes(d.id))
    .map(d => d.name);

  // Build carried suggestions from prior week by week field
  const carriedNames = db.readyMeals
    .filter(r => r.carried && r.week === addWks(viewWeek, -1))
    .map(r => r.name);

  // Build rmSuggestions: carried first (deduped against cook plan), then remaining cook plan
  rmSuggestions = [
    ...carriedNames.map(n => ({ name: n, isCarried: true })),
    ...weekDishNames.filter(n => !carriedNames.includes(n)).map(n => ({ name: n, isCarried: false })),
  ];

  openModal(`
    <div class="modal-title" id="rm-modal-title" style="display:flex;justify-content:space-between;align-items:center"><span>${m ? 'Edit Ready Meal' : 'Add Ready Meal'}${m?.isLeftover ? '<span class="badge badge-orange" style="margin-left:8px;vertical-align:middle">* leftover</span>' : ''}</span><button class="btn-icon ico-muted" onclick="closeModal()">${ICO_CLOSE}</button></div>
    <div class="form-group">
      <label class="form-label">Dish Name *</label>
      <input class="form-input" id="rm-name" value="${escHtml(m?.name || '')}" placeholder="e.g. Braised Pork Belly"
        autocomplete="off" onfocus="showRmSuggestions()" oninput="filterRmSuggestions(this.value)" onchange="handleRmNameChange(this)">
      <div class="rm-suggestions hidden" id="rm-suggestions"></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-select" id="rm-cat">
          ${['Protein','Fibre','Carbs','Full Meal'].map(c => `<option${m?.category === c ? ' selected' : ''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Location</label>
        <select class="form-select" id="rm-loc">
          ${locs.map(l => `<option${m?.loc === l ? ' selected' : ''}>${l}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Week to eat</label>
        <select class="form-select" id="rm-week">
          ${[-1,0,1,2].map(n => { const w = addWks(viewWeek, n); const marker = n === -1 ? ' (-1)' : n === 0 ? ' ✓' : n === 1 ? ' (+1)' : ' (+2)'; return `<option value="${w}"${(m?.week||viewWeek)===w?' selected':''}>${fmtDate(w)}${marker}</option>`; }).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Servings</label>
        <input class="form-input" id="rm-servings" type="number" min="0" step="1" value="${m?.servings ?? 4}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date Cooked</label>
        <input class="form-input" id="rm-cooked" type="date" value="${defaultCooked}">
      </div>
      <div class="form-group">
        <label class="form-label">Eat By (optional)</label>
        <input class="form-input" id="rm-eatby" type="date" value="${m?.eatBy || ''}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Note (optional)</label>
      <input class="form-input" id="rm-note" value="${escHtml(m?.note || '')}" placeholder="e.g. Middle shelf">
    </div>
    <div class="modal-footer">
      <div></div>
      <div class="modal-footer-right">
        <button class="btn-primary" onclick="saveReady(${id || 'null'})">Save</button>
      </div>
    </div>
  `);

  // Register outside-tap listener (click + touchstart for mobile)
  if (rmOutsideClickListener) {
    document.removeEventListener('click', rmOutsideClickListener);
    document.removeEventListener('touchstart', rmOutsideClickListener);
  }
  rmOutsideClickListener = function(e) {
    const container = document.getElementById('rm-suggestions');
    const input = document.getElementById('rm-name');
    if (container && input && !container.contains(e.target) && e.target !== input) {
      hideRmSuggestions();
    }
  };
  setTimeout(() => {
    document.addEventListener('click', rmOutsideClickListener);
    document.addEventListener('touchstart', rmOutsideClickListener);
  }, 0);
}

function saveReady(id) {
  const name = document.getElementById('rm-name').value.trim();
  if (!name) return alert('Dish name is required');
  const matchedDish = db.dishes.find(d => d.name.toLowerCase() === name.toLowerCase());
  const obj = {
    id: id || nextId(),
    name,
    dishId: matchedDish ? matchedDish.id : null,
    isLeftover: id ? (db.readyMeals.find(x => x.id === id)?.isLeftover || false) : rmIsLeftover,
    carried: id ? (db.readyMeals.find(x => x.id === id)?.carried || false) : false,
    week: document.getElementById('rm-week').value,
    category: document.getElementById('rm-cat').value,
    servings: parseInt(document.getElementById('rm-servings').value) || 0,
    loc: document.getElementById('rm-loc').value,
    cooked: document.getElementById('rm-cooked').value || '',
    eatBy: document.getElementById('rm-eatby').value || '',
    note: document.getElementById('rm-note').value.trim(),
  };
  if (id) {
    const idx = db.readyMeals.findIndex(x => x.id === id);
    db.readyMeals[idx] = obj;
  } else {
    db.readyMeals.push(obj);
  }
  saveData();
  viewWeek = obj.week;
  closeModal();
  render();
}

// ═══════════════════════════════════════════════════
// PORTIONS GUIDE
// ═══════════════════════════════════════════════════
// Accessible via fork-and-spoon icon button in the header on all tabs — not a tab of its own.
// Edit buttons always visible per row, no edit mode toggle needed.
// Delete uses inline named-function confirm pattern inside the edit form (servingDeleteId flag),
// mirroring the dish delete pattern. SVG close icon in edit form title navigates back to the list.
// ═══════════════════════════════════════════════════

function renderServingModal() {
  const rows = db.servingGuide;

  let html = `<div class="recipe-topbar">
      <div class="modal-title" style="margin-bottom:0">Portions Guide</div>
      <div class="recipe-topbar-actions">
        <button class="btn-icon ico-muted" onclick="closeModal()">${ICO_CLOSE}</button>
      </div>
    </div>
    <div class="recipe-body">`;

  if (rows.length === 0) {
    html += `<div style="padding:20px 0;text-align:center;color:var(--text-muted);font-size:13px">No entries yet.</div>`;
  } else {
    html += `<div style="overflow-x:auto;margin-bottom:12px">
      <table class="guide-table" style="width:100%">
        <thead>
          <tr>
            <th>Dish</th>
            <th>Meal</th>
            <th>Qty / Unit</th>
            <th>Notes</th>
            <th style="width:38px"></th>
          </tr>
        </thead>
        <tbody>`;

    rows.forEach(r => {
      const mealClass = { Lunch: 'meal-lunch', Dinner: 'meal-dinner', Snack: 'meal-snack', Breakfast: 'meal-breakfast' }[r.mealType] || 'meal-lunch';
      html += `<tr>
        <td style="font-weight:600">${escHtml(r.dish)}</td>
        <td><span class="meal-badge ${mealClass}">${escHtml(r.mealType)}</span></td>
        <td style="max-width:90px;word-break:break-word">${r.qty} ${escHtml((r.unit||'').toLowerCase())}</td>
        <td style="color:var(--text-muted);font-size:12px">${escHtml(r.notes || '')}</td>
        <td><button class="btn-icon ico" onclick="openServingModal(${r.id})">${ICO_EDIT}</button></td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
  }

  html += `<div style="display:flex;justify-content:flex-end">
    <button class="btn-primary btn-primary-sm" onclick="openServingModal()">+ Add Entry</button>
  </div>`;

  html += `</div>`; // close recipe-body

  return html;
}

function openPortionsModal() {
  confirmDel = null;
  servingDeleteId = null;
  openModal(renderServingModal(), true);
}

function openServingModal(id) {
  const r = id ? db.servingGuide.find(x => x.id === id) : null;
  const mealTypes = ['Breakfast', 'Lunch', 'Dinner', 'Snack'];

  const deleteFooter = id
    ? (servingDeleteId === id
        ? `<div style="display:flex;align-items:center;gap:8px">
             <span style="font-size:13px;color:var(--red)">Delete entry?</span>
             <button class="btn-danger row-actions" onclick="confirmServingDelete(${id})">${ICO_TICK} Yes</button>
             <button class="btn-cancel row-actions" onclick="cancelServingDelete(${id})">${ICO_CROSS} No</button>
           </div>`
        : `<button class="btn-icon ico" onclick="startServingDelete(${id})" title="Delete">${ICO_TRASH}</button>`)
    : '';

  openModal(`
    <div class="recipe-topbar">
      <div class="modal-title" style="margin-bottom:0">${r ? 'Edit Entry' : 'Add Entry'}</div>
      <div class="recipe-topbar-actions">
        <button class="btn-icon ico-muted" onclick="openPortionsModal()">${ICO_CLOSE}</button>
      </div>
    </div>
    <div class="recipe-body">
      <div class="form-group">
        <label class="form-label">Dish *</label>
        <input class="form-input" id="sg-dish" value="${escHtml(r?.dish || '')}" placeholder="e.g. Pasta">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Meal Type</label>
          <select class="form-select" id="sg-meal">
            ${mealTypes.map(t => `<option${r?.mealType === t ? ' selected' : ''}>${t}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Qty</label>
          <input class="form-input" id="sg-qty" type="number" step="0.25" value="${r?.qty ?? ''}">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Unit</label>
        ${unitComboHtml('sg-unit', r?.unit||'')}
      </div>
      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <input class="form-input" id="sg-notes" value="${escHtml(r?.notes || '')}" placeholder="e.g. Cooks to 186g">
      </div>
      <div class="modal-footer">
        <div>${deleteFooter}</div>
        <div class="modal-footer-right">
          <button class="btn-primary" onclick="saveServing(${id || 'null'})">Save</button>
        </div>
      </div>
    </div>
  `, true);
}

function startServingDelete(id) {
  servingDeleteId = Number(id);
  openServingModal(id);
}

function cancelServingDelete(id) {
  servingDeleteId = null;
  openServingModal(id);
}

function confirmServingDelete(id) {
  servingDeleteId = null;
  id = Number(id);
  db.servingGuide = db.servingGuide.filter(x => x.id !== id);
  saveData();
  openModal(renderServingModal(), true);
}

function saveServing(id) {
  const dish = document.getElementById('sg-dish').value.trim();
  if (!dish) return alert('Dish name is required');
  const obj = {
    id: id || nextId(),
    dish,
    mealType: document.getElementById('sg-meal').value,
    qty: parseFloat(document.getElementById('sg-qty').value) || 0,
    unit: document.getElementById('sg-unit').value.trim().toLowerCase(),
    notes: document.getElementById('sg-notes').value.trim(),
  };
  saveCustomUnit(document.getElementById('sg-unit').value);
  if (id) {
    const idx = db.servingGuide.findIndex(x => x.id === id);
    db.servingGuide[idx] = obj;
  } else {
    db.servingGuide.push(obj);
  }
  saveData();
  openModal(renderServingModal(), true);
}

// TAB 5 — SHOPPING LIST
// ═══════════════════════════════════════════════════
function renderShop() {
  const planItems = db.shoppingList || [];
  const extras = db.shoppingExtras || [];
  const allItems = [...planItems, ...extras];
  const total = allItems.length;
  const ticked = allItems.filter(x => x.checked).length;
  const pct = total > 0 ? Math.round((ticked / total) * 100) : 0;
  const hasTicked = ticked > 0;

  let html = `<div class="section">
    <div class="shop-header">
      <span class="shop-title" style="display:flex;align-items:center;gap:7px">${ICO_CART} Grocery List</span>
      <div class="shop-header-btns">
        ${hasTicked ? `<button class="btn-icon ico" onclick="clearTicked()" title="Delete ticked items">${ICO_TRASH}</button>` : ''}
        ${total > 0 ? (confirmDel && confirmDel.scope === 'shopAll'
          ? `<div class="del-confirm">
               <button class="btn-danger row-actions" onclick="doDel('shopAll',0)">${ICO_TICK}</button>
               <button class="btn-cancel row-actions" onclick="cancelDel()">${ICO_CROSS}</button>
             </div>`
          : `<button class="btn-icon ico" onclick="startDel('shopAll',0)" title="Clear list">${ICO_BROOM}</button>`)
        : ''}
        <button class="btn-icon ico" onclick="copyShopList()" title="Copy list">${ICO_COPY}</button>
        <button class="btn-primary" style="padding:6px 10px;font-size:12px" onclick="openShopExtraModal()">+ Item</button>
      </div>
    </div>`;

  if (total > 0) {
    html += `<div class="progress-label">${ticked} of ${total} items ticked off</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>`;
  }

  html += `</div><div style="padding:0 14px 14px">`;

  // FROM COOK PLAN section
  html += `<div class="shop-section-header">FROM COOK PLAN</div>`;
  if (planItems.length === 0) {
    html += `<div class="shop-empty">No cook plan items.<br>Generate from the Dishes tab.</div>`;
  } else {
    planItems.forEach(item => {
      const pantryMeta = item.pantryQty !== null
        ? `Need: ${item.needed} ${escHtml((item.unit||'').toLowerCase())} · ${item.pantryLoc ? item.pantryLoc + ': ' : ''}${item.pantryQty} ${escHtml((item.pantryUnit||'').toLowerCase())}`
        : `Need: ${item.needed} ${escHtml((item.unit||'').toLowerCase())} · None at home`;
      html += `<div class="shop-item${item.checked ? ' checked' : ''}">
        <input type="checkbox" class="shop-check" ${item.checked ? 'checked' : ''} onchange="toggleShopItem('plan',${item.id},this.checked)">
        <div class="shop-item-body">
          <div class="shop-item-left">
            <div class="shop-item-name">${escHtml(item.name)}</div>
            <div class="shop-item-meta">${pantryMeta}</div>
          </div>
          <div class="shop-item-right">
            <input class="shop-tobuy-input" type="number" step="0.01" value="${item.toBuyQty ?? item.needed}" oninput="updateToBuy(${item.id},this.value)" onchange="updateToBuy(${item.id},this.value)">
            <input class="shop-tobuy-unit-input" type="text" value="${escHtml((item.toBuyUnit ?? item.unit ?? '').toLowerCase())}" onchange="updateToBuyUnit(${item.id},this.value)">
          </div>
        </div>
      </div>`;
    });
  }

  // EXTRAS section
  html += `<div class="shop-section-header" style="margin-top:10px">EXTRAS</div>`;
  if (extras.length === 0) {
    html += `<div class="shop-empty">No extras yet. Tap + Item to add.</div>`;
  } else {
    extras.forEach(item => {
      html += `<div class="shop-item${item.checked ? ' checked' : ''}">
        ${delBtn('shopX', item.id)}
        <input type="checkbox" class="shop-check" ${item.checked ? 'checked' : ''} onchange="toggleShopItem('extra',${item.id},this.checked)" style="margin-left:0">
        <div class="shop-item-body">
          <div class="shop-item-left">
            <div class="shop-item-name">${escHtml(item.name)}</div>
            ${item.pantryQty != null ? `<div class="shop-item-meta">${item.pantryLoc ? item.pantryLoc + ': ' : ''}${item.pantryQty} ${escHtml((item.pantryUnit||'').toLowerCase())}</div>` : ''}
          </div>
          ${(item.qty != null || item.unit) ? `<div class="shop-item-right">
            <span class="shop-tobuy-input" style="display:inline-block;text-align:center;padding:5px 8px;font-size:14px;font-weight:700;color:var(--green-dark);background:var(--green-light);border:1.5px solid var(--border);border-radius:6px;min-width:68px">${item.qty != null ? item.qty : '—'}</span>
            <span class="shop-tobuy-unit">${escHtml((item.unit||'').toLowerCase())}</span>
          </div>` : ''}
        </div>
      </div>`;
    });
  }

  html += `</div>`;
  return html;
}

function toggleShopItem(listType, id, checked) {
  id = Number(id);
  if (listType === 'plan') {
    const item = db.shoppingList.find(x => x.id === id);
    if (item) item.checked = checked;
  } else {
    const item = db.shoppingExtras.find(x => x.id === id);
    if (item) item.checked = checked;
  }
  saveData();
  const scrollY = window.scrollY || document.documentElement.scrollTop;
  renderContent();
  requestAnimationFrame(() => window.scrollTo(0, scrollY));
}

function updateToBuy(id, val) {
  id = Number(id);
  const item = db.shoppingList.find(x => x.id === id);
  if (item) {
    item.toBuyQty = parseFloat(val) || 0;
    saveData();
  }
}

function updateToBuyUnit(id, val) {
  id = Number(id);
  const item = db.shoppingList.find(x => x.id === id);
  if (item) {
    item.toBuyUnit = val.trim().toLowerCase();
    saveData();
  }
}

function clearTicked() {
  db.shoppingList = db.shoppingList.filter(x => !x.checked);
  db.shoppingExtras = db.shoppingExtras.filter(x => !x.checked);
  saveData();
  render();
}

function openShopExtraModal() {
  openModal(`
    <div class="modal-title">Add Extra Item</div>
    <div class="form-group">
      <label class="form-label">Item Name *</label>
      <input class="form-input" id="sx-name" placeholder="e.g. Garlic">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Qty (optional)</label>
        <input class="form-input" id="sx-qty" type="number" step="0.01" placeholder="">
      </div>
      <div class="form-group">
        <label class="form-label">Unit (optional)</label>
        ${unitComboHtml('sx-unit', '')}
      </div>
    </div>
    <div class="modal-footer">
      <div></div>
      <div class="modal-footer-right">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveShopExtra()">Add</button>
      </div>
    </div>
  `);
}

function saveShopExtra() {
  const name = document.getElementById('sx-name').value.trim();
  if (!name) return alert('Item name is required');
  db.shoppingExtras.push({
    id: nextId(),
    name,
    qty: parseFloat(document.getElementById('sx-qty').value) || null,
    unit: document.getElementById('sx-unit').value.trim().toLowerCase(),
    checked: false,
  });
  saveCustomUnit(document.getElementById('sx-unit').value);
  saveData();
  closeModal();
  render();
}

function copyShopList() {
  const planItems = db.shoppingList || [];
  const extras = db.shoppingExtras || [];

  const unticked = [];

  planItems.forEach(item => {
    const qty = item.toBuyQty != null ? item.toBuyQty : item.needed;
    if (!item.checked && qty > 0) unticked.push(`${item.name} ${qty} ${item.toBuyUnit ?? item.unit}`.trim());
  });

  extras.forEach(item => {
    if (!item.checked) {
      const str = item.qty != null ? `${item.name} ${item.qty}${item.unit ? ' ' + item.unit : ''}` : item.name;
      unticked.push(str);
    }
  });

  const text = unticked.length > 0 ? '/add ' + unticked.join(', ') : '(nothing to buy)';

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!')).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); alert('Copied to clipboard!'); }
  catch { alert('Could not copy. Text:\n\n' + text); }
  document.body.removeChild(ta);
}

// ═══════════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════════
function exportData() {
  const json = JSON.stringify(db, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = localStr(new Date());
  a.href = url;
  a.download = `meal-planner-backup-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      // Basic validation — check for at least one known key
      if (!imported.ingredients && !imported.dishes && !imported.weeks) {
        alert('This does not appear to be a valid Meal Planner backup file.');
        return;
      }
      if (!confirm('This will replace all your current data with the backup. Continue?')) return;
      db = imported;
      // Ensure required arrays exist in case backup is from older version
      ['ingredients','dishes','readyMeals','servingGuide','shoppingList','shoppingExtras','customUnits'].forEach(k => {
        if (!db[k]) db[k] = [];
      });
      if (!db.weeks) db.weeks = {};
      // Wipe ready meals if none have a week field (backup pre-dates week field)
      if (db.readyMeals.length > 0 && !db.readyMeals.some(m => m.week)) {
        db.readyMeals = [];
      }
      // Prune custom units now covered by the updated STANDARD_UNITS list
      if (db.customUnits) {
        db.customUnits = db.customUnits.filter(u => !STANDARD_UNITS.includes(u.toLowerCase()));
      }
      saveData();
      render();
      alert('Data restored successfully.');
    } catch {
      alert('Could not read the file. Make sure it is a valid JSON backup.');
    }
  };
  reader.readAsText(file);
  // Reset input so the same file can be re-imported if needed
  event.target.value = '';
}

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
renderContent();
</script>
</body>
</html>
