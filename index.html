<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🍚 Meal Planner</title>
<style>
  :root {
    --green-dark: #1e4a09;
    --green-primary: #2d7a0a;
    --green-light: #eaf3de;
    --green-mid: #4a9e1a;
    --bg: #f7f3ee;
    --border: #e0d9d0;
    --text: #2a2a2a;
    --text-muted: #888;
    --text-secondary: #555;
    --red: #c0392b;
    --red-dark: #b91c1c;
    --amber: #d97706;
    --amber-dark: #92400e;
    --amber-bg: #fef3c7;
    --amber-border: #fcd34d;
    --yellow: #a88000;
    --surface: #f9f7f4;
    --fridge-bg: #dbeafe;
    --fridge-text: #1e40af;
    --freezer-bg: #e0e7ff;
    --freezer-text: #3730a3;
    --pantry-bg: #fdf0e0;
    --pantry-text: #7c4a1e;
    --radius: 10px;
    --shadow: 0 2px 8px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 70px;
  }

  #app { max-width: 460px; margin: 0 auto; position: relative; }

  /* ── HEADER ── */
  #header {
    background: var(--green-dark);
    color: white;
    padding: 14px 16px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  #header.no-strip { padding-bottom: 14px; }
  #header-title { font-size: 18px; font-weight: 700; letter-spacing: 0.3px; }
  /* ── WEEK STRIP ── */
  #week-strip {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 8px 0 8px;
    overflow: hidden;
  }
  #week-strip.hidden { display: none; }
  .week-arrow {
    background: none;
    border: none;
    color: white;
    font-size: 18px;
    padding: 4px 4px;
    cursor: pointer;
    opacity: 0.85;
    flex-shrink: 0;
  }
  .week-arrow:active { opacity: 0.5; }
  #week-dates { display: flex; gap: 3px; flex: 1; justify-content: center; overflow: hidden; }
  .week-btn {
    background: transparent;
    border: 1.5px solid transparent;
    color: rgba(255,255,255,0.75);
    border-radius: 20px;
    padding: 4px 7px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .week-btn.current-week { border-color: rgba(255,255,255,0.55); color: rgba(255,255,255,0.9); }
  .week-btn.selected { background: white; color: var(--green-dark); font-weight: 700; border-color: white; }
  .now-btn {
    background: none;
    border: 1.5px solid rgba(255,255,255,0.35);
    color: rgba(255,255,255,0.45);
    border-radius: 20px;
    padding: 4px 7px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .now-btn.active {
    border-color: rgba(255,255,255,0.75);
    color: rgba(255,255,255,0.9);
  }
  .now-btn.active:active { opacity: 0.6; }

  /* ── TAB BAR ── */
  #tab-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 460px;
    background: white;
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 8px 2px 6px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 11px;
    color: var(--text-muted);
    transition: color 0.15s;
  }
  .tab-btn .tab-icon { line-height: 0; }
  .tab-btn.active { color: var(--green-primary); font-weight: 600; }

  /* ── CONTENT ── */
  #content { padding: 0; }

  /* ── SECTIONS ── */
  .section { padding: 14px 14px 0; }

  /* ── CARDS ── */
  .card {
    background: white;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 12px;
  }

  /* ── BUTTONS ── */
  .btn-primary {
    background: var(--green-primary);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-secondary {
    background: white;
    color: var(--green-primary);
    border: 1.5px solid var(--green-primary);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-danger {
    background: white;
    color: var(--red);
    border: 1.5px solid var(--red);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-cancel {
    background: white;
    color: var(--text-muted);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
    font-size: 16px;
    line-height: 1;
    border-radius: 6px;
  }
  .btn-icon:active { background: #eee; }

  /* ── FILTER CHIPS ── */
  .filter-group { margin-bottom: 12px; }
  .filter-label { font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 5px; }
  .filter-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
    white-space: nowrap;
    /* Fixed height + flex ensures all chips are identical size regardless of content or context */
    height: 26px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .chip.active {
    background: var(--green-primary);
    border-color: var(--green-primary);
    color: white;
    font-weight: 600;
  }
  .chip.warning-chip.active { background: #b45309; border-color: #b45309; }

  /* ── SEARCH ── */
  .search-input {
    width: 100%;
    padding: 6px 12px; /* matches small primary button height */
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: white;
  }
  .search-input:focus { outline: none; border-color: var(--green-primary); }

  /* ── ROW ITEMS ── */
  .item-row {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
    min-height: 52px;
  }
  .item-row:last-child { border-bottom: none; }
  .item-main { flex: 1; min-width: 0; }
  .item-name { font-size: 14px; font-weight: 600; }
  .item-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  /* ── BADGES ── */
  .badge {
    display: inline-block;
    border-radius: 12px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-green { background: var(--green-light); color: var(--green-dark); }
  .badge-red { background: #fde8e6; color: var(--red-dark); }
  .badge-orange { background: var(--amber-bg); color: var(--amber-dark); }
  .badge-amber { background: #fffbeb; color: var(--amber); border: 1px solid var(--amber-border); }
  .badge-yellow { background: #fefce8; color: #854d0e; border: 1px solid #fde68a; }
  .badge-grey { background: #f3f4f6; color: #6b7280; }
  .badge-fridge { background: var(--fridge-bg); color: var(--fridge-text); }
  .badge-freezer { background: var(--freezer-bg); color: var(--freezer-text); }
  .badge-pantry { background: var(--pantry-bg); color: var(--pantry-text); }
  .badge-protein { background: #fee2e2; color: #991b1b; }
  .badge-fibre { background: #dcfce7; color: #166534; }
  .badge-carbs { background: #fef9c3; color: #713f12; }
  .badge-condiments { background: #fce7f3; color: #831843; }
  .badge-drygds { background: #f3e8ff; color: #5b21b6; }
  .badge-snacks { background: #ffedd5; color: #7c2d12; }
  .badge-drinks { background: #cffafe; color: #0e7490; }
  .badge-sauces { background: #fde8d8; color: #9a3412; }
  .badge-fullmeal { background: #e0f2fe; color: #075985; }

  /* ── HOME TAB ── */
  .expiry-banner {
    background: var(--amber-bg);
    border: 1.5px solid var(--amber-border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--amber-dark);
    cursor: pointer;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .week-banner-card {
    background: linear-gradient(135deg, var(--green-dark), var(--green-primary));
    border-radius: var(--radius);
    padding: 14px 16px;
    color: white;
    margin-bottom: 12px;
  }
  .week-banner-card .label { font-size: 11px; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.8px; }
  .week-banner-card .week-title { font-size: 18px; font-weight: 700; margin-top: 4px; }

  /* ── DISHES TAB ── */
  .context-banner {
    background: var(--green-light);
    border: 1.5px solid #b6d98a;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    color: var(--green-dark);
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .this-week-panel { margin-bottom: 12px; }
  .this-week-header {
    background: var(--green-dark);
    color: white;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .this-week-header.collapsed { border-radius: var(--radius); }
  .this-week-body { background: white; border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); padding: 6px 0; }
  .serving-row { display: flex; align-items: center; padding: 8px 12px; border-bottom: 1px solid #f0f0f0; gap: 8px; }
  .serving-row:last-child { border-bottom: none; }
  .serving-counter { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .counter-btn { background: none; border: 1.5px solid var(--border); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--green-primary); font-weight: 700; }
  .counter-val { width: 36px; min-width: 36px; text-align: center; font-size: 15px; font-weight: 700; border: none; background: transparent; padding: 0; font-family: inherit; color: inherit; -webkit-appearance: none; -moz-appearance: textfield; }
  .counter-val:focus { outline: 1.5px solid var(--green-primary); border-radius: 4px; background: white; }
  .counter-val::-webkit-inner-spin-button, .counter-val::-webkit-outer-spin-button { -webkit-appearance: none; }
  .total-servings { padding: 8px 14px; font-size: 12px; color: var(--text-muted); border-top: 1px solid #f0f0f0; text-align: right; }

  .dish-row {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .dish-row:last-child { border-bottom: none; }
  .dish-row:active { background: #f0f0f0; }
  .dish-row.selected { background: var(--green-light); }
  .dish-check { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.12s; }
  .dish-row.selected .dish-check { background: var(--green-primary); border-color: var(--green-primary); color: white; }
  .dish-info { flex: 1; min-width: 0; }
  .dish-name { font-size: 14px; font-weight: 600; }
  .dish-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  /* ── MODALS ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.fullscreen { align-items: flex-start; }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: white;
    border-radius: 18px 18px 0 0;
    width: 100%;
    max-width: 460px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px 18px 30px;
    animation: slideUp 0.25s ease;
  }
  .modal-fullscreen {
    border-radius: 0;
    max-height: 100dvh;
    height: 100dvh;
    padding: env(safe-area-inset-top, 8px) 0 30px;
  }
  .recipe-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px 10px;
    background: white;
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .recipe-topbar-actions { display: flex; gap: 8px; align-items: center; }
  .recipe-body { padding: 16px 18px 30px; }
  @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-title { font-size: 19px; font-weight: 700; margin-bottom: 16px; }
  .modal-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }
  .modal-footer-right { display: flex; gap: 8px; }

  .form-group { margin-bottom: 13px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: white;
    color: var(--text);
    font-family: inherit;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--green-primary); }
  .form-textarea { min-height: 160px; resize: vertical; }
  .form-row { display: flex; gap: 8px; }
  .form-row .form-group { flex: 1; }

  /* ingredient rows in dish modal */
  .ing-row { display: flex; gap: 6px; align-items: flex-end; margin-bottom: 6px; }
  .ing-row .form-input { flex: 1; }
  .ing-row .form-input.qty { max-width: 70px; }
  .ing-row .form-input.unit { max-width: 80px; text-transform: lowercase; }
  .remove-ing { background: none; border: none; color: var(--red); cursor: pointer; padding: 2px 4px; line-height: 0; margin-bottom: 2px; }

  /* ── CONFIRM DELETE INLINE ── */
  .del-confirm { display: flex; align-items: center; gap: 5px; }

  /* ── DETAIL MODAL ── */
  .detail-section { margin-bottom: 14px; }
  .detail-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 6px; }
  .detail-ing-table { width: 100%; border-collapse: collapse; }
  .detail-ing-table td { padding: 5px 8px; font-size: 14px; background: var(--green-light); border-bottom: 2px solid white; }
  .detail-ing-table tr:first-child td:first-child { border-radius: 6px 0 0 0; }
  .detail-ing-table tr:first-child td:last-child { border-radius: 0 6px 0 0; }
  .detail-ing-table tr:last-child td { border-bottom: none; }
  .detail-ing-table tr:last-child td:first-child { border-radius: 0 0 0 6px; }
  .detail-ing-table tr:last-child td:last-child { border-radius: 0 0 6px 0; }
  .dit-name { font-weight: 600; }
  .dit-qtyunit { width: 80px; text-align: right; white-space: nowrap; }
  .dit-cat { width: 25%; padding-left: 8px; }
  .unit-field { text-transform: lowercase; }
  .unit-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; padding: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .unit-pill { background: white; border: 1.5px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 12px; cursor: pointer; color: var(--text-muted); transition: all 0.15s; white-space: nowrap; }
  .unit-pill:active { background: var(--green-primary); border-color: var(--green-primary); color: white; }
  .detail-notes { font-size: 15px; color: #444; background: var(--surface); padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); line-height: 1.7; }
  .recipe-section-header { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; border-top: 1px solid var(--border); margin-top: 10px; margin-bottom: 4px; padding-top: 8px; }
  .detail-checkbox { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--green-light); border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--green-dark); }
  .detail-checkbox input { width: 18px; height: 18px; accent-color: var(--green-primary); }

  /* ── REPLACE CONFIRM ── */
  .replace-confirm { background: #fff7ed; border: 1.5px solid #fed7aa; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
  .replace-confirm p { font-size: 13px; color: var(--amber-dark); margin-bottom: 10px; }
  .replace-confirm .btn-row { display: flex; gap: 8px; }

  /* ── READY MEALS TAB ── */
  .stats-bar {
    display: flex;
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .stat-cell {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat-cell:last-child { border-right: none; }
  .stat-val { font-size: 20px; font-weight: 700; color: var(--green-primary); }
  .stat-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 2px; }

  .ready-card {
    background: white;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .ready-card-top {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    gap: 8px;
    border-bottom: 1px solid #f5f5f5;
  }
  .ready-card-body {
    padding: 8px 12px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .ready-card-meta { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; flex: 1; min-width: 0; }
  .ready-card-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

  /* ── SERVING SIZE GUIDE TAB ── */
  .guide-table { width: 100%; border-collapse: collapse; }
  .guide-table th {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 8px 10px;
    text-align: left;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .guide-table td {
    padding: 9px 10px;
    font-size: 13px;
    border-bottom: 1px solid #f0ede8;
    vertical-align: middle;
  }
  .guide-table tr:last-child td { border-bottom: none; }
  .guide-table tr:hover td { background: #faf9f7; }
  .meal-badge {
    display: inline-block;
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
  }
  .meal-lunch { background: #fef9c3; color: #713f12; }
  .meal-dinner { background: #e0e7ff; color: #3730a3; }
  .meal-snack { background: #dcfce7; color: #166534; }
  .meal-breakfast { background: #ffedd5; color: #7c2d12; }

  /* ── SHOPPING LIST TAB ── */
  .shop-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    gap: 6px;
  }
  .shop-title { font-size: 15px; font-weight: 700; flex: 1; }
  .shop-header-btns { display: flex; gap: 5px; }
  .progress-bar-wrap {
    background: #e5e7eb;
    border-radius: 99px;
    height: 6px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .progress-bar-fill {
    background: var(--green-primary);
    height: 100%;
    border-radius: 99px;
    transition: width 0.3s ease;
  }
  .progress-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }

  .shop-section-header {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 6px 0 6px;
    margin-bottom: 2px;
  }
  .shop-item {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 7px;

// DATE HELPERS
// ═══════════════════════════════════════════════════
function localStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function daysUntilExpiry(dateStr) {
  if (!dateStr) return null;
  const [y, m, d] = dateStr.split('-').map(Number);
  const expiry = new Date(y, m - 1, d);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  expiry.setHours(0, 0, 0, 0);
  return Math.floor((expiry - today) / 86400000);
}

function addWks(dateStr, n) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() + n * 7);
  return localStr(dt);
}

function addDays(dateStr, n) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() + n);
  return localStr(dt);
}

function getThisMonday() {
  const t = new Date();
  t.setHours(0, 0, 0, 0);
  const day = t.getDay(); // 0=Sun
  const diff = day === 0 ? -6 : 1 - day;
  t.setDate(t.getDate() + diff);
  return localStr(t);
}

function fmtDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-').map(Number);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${d} ${months[m - 1]}`;
}

function fmtDateFull(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-').map(Number);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${d} ${months[m - 1]} ${y}`;
}

SAMPLE_DATA.weeks[thisMonday] = { selectedDishes: [1, 2], dishServings: { '1': 10, '2': 8 } };

let db = loadData();
if (!db) {
  db = JSON.parse(JSON.stringify(SAMPLE_DATA));
  saveData();
}
// Ensure servingGuide is pre-populated
if (!db.servingGuide || db.servingGuide.length === 0) {
  db.servingGuide = JSON.parse(JSON.stringify(SAMPLE_DATA.servingGuide));
  saveData();
}
// Ensure required arrays exist
['ingredients','dishes','readyMeals','servingGuide','shoppingList','shoppingExtras','customUnits'].forEach(k => {
  if (!db[k]) db[k] = [];
});
if (!db.weeks) db.weeks = {};
// Wipe ready meals if none have a week field.
// This handles data created before the week field was introduced (e.g. sample data or old records).
// Safe to remove once all users are confirmed to be on data that includes the week field.
if (db.readyMeals.length > 0 && !db.readyMeals.some(m => m.week)) {
  db.readyMeals = [];
  saveData();
}

// ═══════════════════════════════════════════════════
// UNITS
// ═══════════════════════════════════════════════════
// Unit fields use a custom pill picker (not a native select) so users can type free-form units.
// On focus, standard + custom unit pills appear below the input for quick selection.
// Custom units are saved to db.customUnits when a non-standard value is entered.
// Standard units of measure use abbreviations (g, kg, ml etc).
// Non-standard units use full spellings (piece, bottle etc) for clarity.
// Old short forms (pc, btl, pkt, clv, blk) removed — replaced by full-word equivalents.
const STANDARD_UNITS = ['g','kg','ml','l','tbsp','tsp','cup','piece','bottle','packet','clove','block','slice','cube','can','box','carton'];

// Prune custom units that are now covered by the updated STANDARD_UNITS list,
// plus old short forms and plural variants that were previously saved as custom units.
// Runs on every load but is a safe no-op if customUnits is empty or already clean.
const LEGACY_UNITS = ['pc','pcs','btl','pkt','clv','blk','ctn','blocks','cloves','pieces','bottles','packets','slices','cubes','cans','boxes','cartons'];
if (db.customUnits && db.customUnits.length > 0) {
  const before = db.customUnits.length;
  db.customUnits = db.customUnits.filter(u => !STANDARD_UNITS.includes(u.toLowerCase()) && !LEGACY_UNITS.includes(u.toLowerCase()));
  if (db.customUnits.length !== before) saveData();
}

function unitComboHtml(id, currentValue) {
  return `<input class="form-input unit-field" id="${id}" value="${escHtml(currentValue||'')}" placeholder="Unit" autocomplete="off" onfocus="showUnitPills(this.id)" oninput="hideUnitPills()">`;
}

function showUnitPills(inputId) {
  hideUnitPills();
  const input = document.getElementById(inputId);
  if (!input) return;
  const custom = db.customUnits || [];
  const allUnits = [...STANDARD_UNITS, ...custom];
  const container = document.createElement('div');
  container.className = 'unit-pills';
  container.id = 'unit-pills-container';
  allUnits.forEach(u => {
    const pill = document.createElement('button');
    pill.className = 'unit-pill';
    pill.type = 'button';
    pill.textContent = u;
    pill.onclick = () => { input.value = u; hideUnitPills(); };
    container.appendChild(pill);
  });
  input.parentNode.insertBefore(container, input.nextSibling);
}

function hideUnitPills() {
  const existing = document.getElementById('unit-pills-container');
  if (existing) existing.remove();
}


function saveCustomUnit(val) {
  if (!val) return;
  const v = val.trim().toLowerCase();
  if (!v || STANDARD_UNITS.includes(v) || (db.customUnits||[]).includes(v)) return;
  if (!db.customUnits) db.customUnits = [];
  db.customUnits.push(v);
  saveData();
}

function nextId() {
  const id = db.nextId || 11;
  db.nextId = id + 1;
  return id;
}

// ═══════════════════════════════════════════════════
// WEEK DATA HELPERS
// ═══════════════════════════════════════════════════
// Cook plan data (selected dishes + serving counts) is stored per-week in db.weeks,
// keyed by the Monday date string (e.g. "2026-03-16").
// Ready meals use a separate week field on each record — see DATA MODEL above.
function getWeekData(wk) {
  if (!db.weeks[wk]) db.weeks[wk] = { selectedDishes: [], dishServings: {} };
  return db.weeks[wk];
}

function isDishSelected(dishId, wk) {
  return getWeekData(wk).selectedDishes.includes(dishId);
}

function toggleDishSelection(dishId, wk) {
  const wd = getWeekData(wk);
  const idx = wd.selectedDishes.indexOf(dishId);
  if (idx >= 0) {
    wd.selectedDishes.splice(idx, 1);
    delete wd.dishServings[dishId];
  } else {
    wd.selectedDishes.push(dishId);
    wd.dishServings[dishId] = 6;
  }
  saveData();
}

function getDishServings(dishId, wk) {
  const wd = getWeekData(wk);
  return wd.dishServings[dishId] || 6;
}

function setDishServings(dishId, wk, n) {
  const wd = getWeekData(wk);
  wd.dishServings[dishId] = Math.max(1, n);
  saveData();
}

// ═══════════════════════════════════════════════════
// BADGE HELPERS
// ═══════════════════════════════════════════════════
function locBadge(loc) {
  const map = { Fridge: 'badge-fridge', Freezer: 'badge-freezer', Pantry: 'badge-pantry' };
  return `<span class="badge ${map[loc] || 'badge-grey'}">${loc}</span>`;
}

function catBadge(cat) {
  const map = {
    Protein: 'badge-protein', Fibre: 'badge-fibre', Carbs: 'badge-carbs',
    'Dry Goods': 'badge-drygds', Condiments: 'badge-condiments', Snacks: 'badge-snacks',
    Drinks: 'badge-drinks', Sauces: 'badge-sauces', 'Full Meal': 'badge-fullmeal'
  };
  return `<span class="badge ${map[cat] || 'badge-grey'}">${cat}</span>`;
}

// Fallback name-based dish lookup used where dishId is absent (e.g. older records).
// Note: if a dish is renamed in the library, this lookup will fail for old ready meal records.
// New records use dishId directly and don't rely on this function.
function dishIdByName(name) {
  const dish = db.dishes.find(d => d.name.toLowerCase() === name.toLowerCase());
  return dish ? dish.id : null;
}

function expiryBadge(expiry) {
  if (!expiry) return '';
  const days = daysUntilExpiry(expiry);
  if (days < 0) return `<span class="badge badge-red">Expired</span>`;
  if (days <= 4) return `<span class="badge badge-red">${days}d</span>`;
  if (days <= 14) return `<span class="badge badge-amber">${days}d</span>`;
  if (days <= 30) return `<span class="badge badge-yellow">${days}d</span>`;
  return ''; // Far-future expiry — not actionable, shown in edit screen only
}

// ═══════════════════════════════════════════════════
// DELETE PATTERN
// ═══════════════════════════════════════════════════
// Deletion uses an inline two-step confirm pattern to avoid accidental deletes.
// Tapping the trash icon sets confirmDel = {scope, id} and re-renders, showing tick/cross buttons in place.
// Tapping tick calls doDel which performs the delete. Tapping cross clears confirmDel and re-renders.
// scope values: 'ing' (pantry), 'dish', 'ready', 'serving', 'shopX' (shopping extras), 'shopAll' (entire shopping list)
// Dish deletion uses a separate dishDeleteConfirm flag because it lives inside a fullscreen modal
// where render() does not update modal content — openDishModal() is called directly instead.
function delBtn(scope, id) {
  if (confirmDel && confirmDel.scope === scope && confirmDel.id === id) {
    return `<div class="del-confirm">
      <button class="btn-danger row-actions" onclick="doDel('${scope}',${id})">${ICO_TICK}</button>
      <button class="btn-cancel row-actions" onclick="cancelDel()">${ICO_CROSS}</button>
    </div>`;
  }
  return `<button class="btn-icon ico" onclick="startDel('${scope}',${id})" title="Delete">${ICO_TRASH}</button>`;
}

function startDel(scope, id) {
  confirmDel = { scope, id };
  render();
}

function cancelDel() {
  confirmDel = null;
  render();
}

function doDel(scope, id) {
  confirmDel = null;
  id = Number(id);
  if (scope === 'ing') db.ingredients = db.ingredients.filter(x => x.id !== id);
  else if (scope === 'dish') { db.dishes = db.dishes.filter(x => x.id !== id); closeModal(); }
  else if (scope === 'ready') db.readyMeals = db.readyMeals.filter(x => x.id !== id);
  else if (scope === 'serving') { db.servingGuide = db.servingGuide.filter(x => x.id !== id); openModal(renderServingModal(), true); }
  else if (scope === 'shopX') db.shoppingExtras = db.shoppingExtras.filter(x => x.id !== id);
  else if (scope === 'shopAll') { db.shoppingList = []; db.shoppingExtras = []; }
  saveData();
  render();
}

// ═══════════════════════════════════════════════════
// CARRIED / LEFTOVER HELPERS
// ═══════════════════════════════════════════════════
// Two related but distinct flags on ready meal records:
//   carried    — set by the user via the tupperware SVG toggle. Means "this batch has leftovers I want
//                to carry to next week." Makes the meal appear in the Add Ready Meal dropdown
//                for the following week, with a * prefix.
//   isLeftover — set automatically when a carried suggestion is selected in Add Ready Meal.
//                Means "this meal originated as a leftover from the prior week."
//                Shown with * prefix in the ready meals list and modal title badge.
// sortReadyMeals returns a copy sorted with isLeftover meals first — never mutates db.
function carriedToggleHtml(id, carried) {
  // SVG: simple tupperware container — rectangle body + smaller rectangle lid
  return `<button class="carry-btn${carried ? ' active' : ''}" onclick="toggleCarried(${id})" title="${carried ? 'Carried — tap to unmark' : 'Mark as carried to next week'}">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="8" width="14" height="9" rx="1.5" fill="currentColor"/>
      <rect x="5" y="5" width="10" height="3" rx="1" fill="currentColor" opacity="0.7"/>
      <rect x="7" y="3.5" width="6" height="1.5" rx="0.75" fill="currentColor" opacity="0.5"/>
    </svg>
  </button>`;
}

function sortReadyMeals(meals) {
  return [...meals].sort((a, b) => (b.isLeftover ? 1 : 0) - (a.isLeftover ? 1 : 0));
}

function toggleCarried(id) {
  id = Number(id);
  const m = db.readyMeals.find(x => x.id === id);
  if (!m) return;
  m.carried = !m.carried;
  saveData();
  render();
}

// ═══════════════════════════════════════════════════
// SCROLL PRESERVATION
// ═══════════════════════════════════════════════════
// render() preserves scroll position across re-renders (e.g. toggling a checkbox mid-list).
// renderContent() does a raw re-render with no scroll preservation — used for tab switches
// and navigation where scrolling to top is correct behaviour.
// IMPORTANT: render() only updates #content (the page body). It does NOT update modal content.
// Never call render() expecting it to refresh an open modal — use openModal() directly instead.
function render() {
  const scrollY = window.scrollY || document.documentElement.scrollTop || document.body.scrollTop;
  renderContent();
  requestAnimationFrame(() => window.scrollTo(0, scrollY));
}

function renderContent() {
  const content = document.getElementById('content');
  const strip = document.getElementById('week-strip');
  const header = document.getElementById('header');
  const weekAware = activeTab === 0 || activeTab === 1 || activeTab === 2;
  strip.classList.toggle('hidden', !weekAware);
  header.classList.toggle('no-strip', !weekAware);

  if (weekAware) renderWeekStrip();

  const tabs = [renderHome, renderDishes, renderReady, renderPantry, renderShop];
  content.innerHTML = tabs[activeTab]();

  // Populate the pantry item list (kept separate so search oninput can
  // update it without recreating the input element and closing the keyboard)
  if (activeTab === 3) renderPantryList();
}

// ═══════════════════════════════════════════════════
// WEEK STRIP
// ═══════════════════════════════════════════════════
function renderWeekStrip() {
  const dates = [-1, 0, 1, 2].map(n => addWks(viewWeek, n));
  const container = document.getElementById('week-dates');
  const isCurrentWeek = viewWeek === thisMonday;
  const nowBtn = `<button class="now-btn${isCurrentWeek ? '' : ' active'}" onclick="jumpToNow()" title="Current week">Now</button>`;
  container.innerHTML = nowBtn + dates.map(d => {
    const isSelected = d === viewWeek;
    const isCurrent = d === thisMonday && !isSelected;
    let cls = 'week-btn';
    if (isSelected) cls += ' selected';
    else if (isCurrent) cls += ' current-week';
    return `<button class="${cls}" onclick="selectWeek('${d}')">${fmtDate(d)}</button>`;
  }).join('');
}

function jumpToNow() {
  viewWeek = thisMonday;
  render();
}

function selectWeek(d) {
  viewWeek = d;
  render();
}

function shiftWeek(n) {
  viewWeek = addWks(viewWeek, n);
  render();
}

// ═══════════════════════════════════════════════════
// TAB SWITCH
// ═══════════════════════════════════════════════════
function switchTab(idx) {
  activeTab = idx;
  confirmDel = null;
  dishReplaceConfirm = false;
  rmIsLeftover = false;
  rmSuggestions = [];
  if (idx !== 1) thisWeekUserSet = false;
  window.scrollTo(0, 0);
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  renderContent();
}

// ═══════════════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════════════
// openModal(html) — bottom sheet modal (max 80vh), used for add/edit forms.
// openModal(html, true) — fullscreen modal, used for dish detail and dish edit views.
// closeModal(e) — the event argument guard means it only closes when called with no argument
// (e.g. Cancel button) or when the overlay backdrop itself is tapped. Tapping inside the
// modal content does not close it (stopPropagation is set on #modal-content).
function openModal(html, fullscreen) {
  const overlay = document.getElementById('modal-overlay');
  const modal = document.getElementById('modal-content');
  modal.innerHTML = html;
  modal.classList.toggle('modal-fullscreen', !!fullscreen);
  overlay.classList.toggle('fullscreen', !!fullscreen);
  overlay.classList.remove('hidden');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    const overlay = document.getElementById('modal-overlay');
    overlay.classList.add('hidden');
    overlay.classList.remove('fullscreen');
    document.getElementById('modal-content').classList.remove('modal-fullscreen');
    confirmDel = null;
    dishDeleteConfirm = false;
    rmIsLeftover = false;
    if (rmOutsideClickListener) {
      document.removeEventListener('click', rmOutsideClickListener);
      document.removeEventListener('touchstart', rmOutsideClickListener);
      rmOutsideClickListener = null;
    }
  }
}

// ═══════════════════════════════════════════════════
// TAB 1 — HOME
// ═══════════════════════════════════════════════════
function renderHome() {
  const expiringItems = db.ingredients.filter(i => {
    if (!i.expiry) return false;
    const d = daysUntilExpiry(i.expiry);
    return d <= 14;
  });

  let html = '<div class="section">';

  // Expiry banner
  if (expiringItems.length > 0) {
    html += `<div class="expiry-banner" onclick="goToPantryExpiry()">${ICO_WARN} ${expiringItems.length} item${expiringItems.length > 1 ? 's' : ''} ${expiringItems.length > 1 ? 'need' : 'needs'} attention</div>`;
  }

  // Week banner
  html += `<div class="week-banner-card">
    <div class="label">Ready Meals</div>
    <div class="week-title">Week of ${fmtDateFull(viewWeek)}</div>
  </div>`;

  // Ready meals summary — filter by assigned week
  const weekMeals = db.readyMeals.filter(m => m.week === viewWeek);

  if (weekMeals.length === 0) {
    html += `<div class="card"><div style="padding:20px 14px;color:var(--text-muted);font-size:13px;text-align:center">No ready meals this week.<br>Head to the Ready tab to log cooked batches.</div></div>`;
  } else {
    html += '<div class="card">';
    sortReadyMeals(weekMeals).forEach(m => {
      const nameDisplay = `${m.isLeftover ? '* ' : ''}${escHtml(m.name)}`;
      const did = m.dishId || dishIdByName(m.name);
      html += `<div class="item-row">
        <div class="item-main">
          ${did ? `<div class="item-name name-link" onclick="openDishDetail(${did})">${nameDisplay}</div>` : `<div class="item-name">${nameDisplay}</div>`}
          <div class="item-sub">${m.servings} servings · ${m.eatBy ? 'Eat by ' + fmtDate(m.eatBy) : ''}</div>
        </div>
        ${m.category ? catBadge(m.category) : ''}
        ${locBadge(m.loc)}
        ${carriedToggleHtml(m.id, m.carried)}
      </div>`;
    });
    html += '</div>';
  }

  html += '</div>';

  // ── DATA BACKUP ──
  html += `<div class="section" style="padding-bottom:14px">
    <div style="font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:8px">Data Backup</div>
    <div style="display:flex;gap:8px">
      <button class="btn-secondary" style="flex:1;font-size:13px;padding:9px;display:flex;align-items:center;justify-content:center;gap:6px" onclick="exportData()">${ICO_EXPORT} Export</button>
      <button class="btn-secondary" style="flex:1;font-size:13px;padding:9px;display:flex;align-items:center;justify-content:center;gap:6px" onclick="document.getElementById('import-file').click()">${ICO_IMPORT} Import</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:7px">Export saves all your data as a JSON file. Import restores from a previous export.</div>
  </div>`;

  return html;
}

function goToPantryExpiry() {
  pantryExpFilter = true;
  pantryLocFilter = 'All';
  pantryCatFilter = 'All';
  switchTab(3);
}

// ═══════════════════════════════════════════════════
// TAB 2 — PANTRY
// ═══════════════════════════════════════════════════
function renderPantry() {
  const cats = ['All', 'Protein', 'Fibre', 'Carbs', 'Dry Goods', 'Condiments', 'Sauces', 'Snacks', 'Drinks'];
  const locs = ['All', 'Fridge', 'Freezer', 'Pantry'];

  // Expiry chip turns dark red when any pantry item is expiring within 14 days —
  // passive at-a-glance signal without needing an icon.
  const hasExpiring = db.ingredients.some(i => i.expiry && daysUntilExpiry(i.expiry) <= 14);
  const expiryChipStyle = !pantryExpFilter && hasExpiring ? ' style="color:var(--red-dark)"' : '';
  //   Row 1: Location chips + Expiry warning chip on the same line
  //   Row 2: Category chips
  //   Row 3: Search bar + Add button — search bar is full-width flex, button is fixed width
  // Section labels removed to reduce visual bulk — chips are self-explanatory.
  // Search input must remain in renderPantry() (not renderPantryList()) so it is never
  // recreated on keystroke, preventing the mobile keyboard from closing.
  // Add button moved here from renderPantryList() so it sits alongside the search bar.
  let html = `<div class="section">
    <div class="filter-group">
      <div class="filter-chips">
        ${locs.map(l => `<button class="chip${!pantryExpFilter && pantryLocFilter===l?' active':''}" onclick="setLocFilter('${l}')">${l}</button>`).join('')}
        <button class="chip warning-chip${pantryExpFilter?' active':''}" onclick="toggleExpFilter()"${expiryChipStyle}>Expiry</button>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-chips">
        ${cats.map(c => `<button class="chip${!pantryExpFilter && pantryCatFilter===c?' active':''}" onclick="setCatFilter('${c}')">${c}</button>`).join('')}
      </div>
    </div>

    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <div class="search-wrap" style="flex:1;margin-bottom:0">
        <span class="search-icon">${ICO_SEARCH}</span>
        <input class="search-input" type="search" placeholder="Search ingredients…" value="${escHtml(pantrySearch)}" oninput="pantrySearch=this.value;confirmDel=null;renderPantryList()">
      </div>
      <button class="btn-primary" style="padding:6px 10px;font-size:12px" onclick="openIngModal()">+ Item</button>
    </div>
  </div>
  <div id="pantry-list"></div>`;

  return html;
}

// Renders only the item count, Add button, and card list below the pantry filters.
// Called from the search oninput handler so the input element is never recreated
// mid-keystroke — preventing the keyboard from closing on mobile.
function renderPantryList() {
  const container = document.getElementById('pantry-list');
  if (!container) return;

  let items = [...db.ingredients];

  if (pantrySearch.trim()) {
    const q = pantrySearch.toLowerCase();
    items = items.filter(i => i.name.toLowerCase().includes(q));
  }

  if (pantryExpFilter) {
    items = items.filter(i => {
      if (!i.expiry) return false;
      return daysUntilExpiry(i.expiry) <= 14;
    });
    items.sort((a, b) => daysUntilExpiry(a.expiry) - daysUntilExpiry(b.expiry));
  } else {
    if (pantryLocFilter !== 'All') items = items.filter(i => i.loc === pantryLocFilter);
    if (pantryCatFilter !== 'All') items = items.filter(i => i.category === pantryCatFilter);
  }

  // Item count and Add button removed — Add button now lives in renderPantry() alongside search.
  let html = ``;

  if (items.length === 0) {
    html += '<div class="empty-state">No items found</div>';
  } else {
    html += '<div class="card tab-list-card">';
    items.forEach(item => {
      // Category badge intentionally omitted from list view — available in edit screen.
      // Qty/unit rendered small and muted to keep the name as the primary visual element.
      html += `<div class="item-row">
        ${delBtn('ing', item.id)}
        <div class="item-main">
          <div class="item-name">${escHtml(item.name)} <span style="font-weight:400;font-size:12px;color:var(--text-muted)">${item.qty} ${(item.unit||'').toLowerCase()}</span></div>
          <div style="display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;align-items:center">
            ${expiryBadge(item.expiry)}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${locBadge(item.loc)}
          <button class="btn-icon ico" onclick="openIngModal(${item.id})">${ICO_EDIT}</button>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  container.innerHTML = html;
}

function setLocFilter(l) { pantryLocFilter = l; pantryExpFilter = false; confirmDel = null; render(); }
function setCatFilter(c) { pantryCatFilter = c; pantryExpFilter = false; confirmDel = null; render(); }
function toggleExpFilter() { pantryExpFilter = !pantryExpFilter; confirmDel = null; render(); }

// Ingredient Modal
// When called with returnDishId (from pantry peek in dish detail):
//   — ✕ navigates back to the peek view rather than closing entirely
//   — Save navigates back to the dish detail after saving
function openIngModal(id, returnDishId) {
  const ing = id ? db.ingredients.find(x => x.id === id) : null;
  const cats = ['Protein','Fibre','Carbs','Dry Goods','Condiments','Sauces','Snacks','Drinks'];
  const locs = ['Fridge','Freezer','Pantry'];
  const title = ing ? 'Edit Ingredient' : 'Add Ingredient';
  const cancelAction = returnDishId ? `openPantryPeek(${id},${returnDishId})` : `closeModal()`;

  openModal(`
    <div class="modal-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>${title}</span>
      <button class="btn-icon ico-muted" onclick="${cancelAction}">${ICO_CLOSE}</button>
    </div>
    <div class="form-group">
      <label class="form-label">Name *</label>
      <input class="form-input" id="ing-name" value="${escHtml(ing?.name||'')}" placeholder="e.g. Pork belly">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Qty</label>

        </select>

      <label class="form-label">Expiry Date (optional)</label>
      <input class="form-input" id="ing-expiry" type="date" value="${ing?.expiry||''}">

    <div class="form-group">
      <label class="form-label">Note (optional)</label>
      <input class="form-input" id="ing-note" value="${escHtml(ing?.note||'')}" placeholder="e.g. Opened, use first">
    </div>

        ${returnDishId ? '' : `<button class="btn-secondary" onclick="closeModal()">Cancel</button>`}
        <button class="btn-primary" onclick="saveIng(${id||'null'},${returnDishId||'null'})">Save</button>
      </div>

// Saves a pantry ingredient (add or edit).
// After saving, rescans both shoppingList and shoppingExtras to update pantry
// context (qty, unit, location) for any name-matched items, or clears it if
// no match exists — keeping the shopping list in sync with pantry edits.
// When called with returnDishId (from pantry peek), navigates back to the
// dish detail after saving rather than closing the modal and staying on pantry.
function saveIng(id, returnDishId) {
  const name = document.getElementById('ing-name').value.trim();
  if (!name) return alert('Name is required');
  const obj = {
    id: id || nextId(),
    name,
    qty: parseFloat(document.getElementById('ing-qty').value) || 0,
    unit: document.getElementById('ing-unit').value.trim().toLowerCase(),
    category: document.getElementById('ing-cat').value,
    loc: document.getElementById('ing-loc').value,
    expiry: document.getElementById('ing-expiry').value || '',
    note: document.getElementById('ing-note').value.trim(),
  };
  saveCustomUnit(document.getElementById('ing-unit').value);
  if (id) {
    const idx = db.ingredients.findIndex(x => x.id === id);
    db.ingredients[idx] = obj;
  } else {
    db.ingredients.push(obj);
  }

  // Rescan shopping list and extras — update pantry context for any item whose
  // name matches an ingredient, or clear it if no match exists.
  db.shoppingList.forEach(item => {
    const match = db.ingredients.find(p => p.name.toLowerCase() === item.name.toLowerCase());
    item.pantryQty  = match ? match.qty  : null;
    item.pantryUnit = match ? match.unit : null;
    item.pantryLoc  = match ? match.loc  : null;
  });
  db.shoppingExtras.forEach(item => {
    const match = db.ingredients.find(p => p.name.toLowerCase() === item.name.toLowerCase());
    item.pantryQty  = match ? match.qty  : null;
    item.pantryUnit = match ? match.unit : null;
    item.pantryLoc  = match ? match.loc  : null;
  });

  saveData();
  if (returnDishId) {
    renderContent();
    openDishDetail(returnDishId);
  } else {
    closeModal();
    render();
  }
}

// TAB 3 — DISHES
// ═══════════════════════════════════════════════════
function renderDishes() {
  const wd = getWeekData(viewWeek);
  const cats = ['All','Protein','Fibre','Carbs','Full Meal'];

  let dishes = [...db.dishes];
  if (dishCatFilter !== 'All') dishes = dishes.filter(d => d.category === dishCatFilter);

  const selectedDishes = db.dishes.filter(d => wd.selectedDishes.includes(d.id));
  const hasSelected = selectedDishes.length > 0;

  // Auto-manage panel state: collapse when nothing selected; expand when dishes first appear,
  // unless the user has manually set a preference.
  if (!hasSelected) {
    thisWeekCollapsed = true;
    thisWeekUserSet = false;
  } else if (!thisWeekUserSet) {
    thisWeekCollapsed = false;
  }

  const totalServings = selectedDishes.reduce((sum, d) => sum + getDishServings(d.id, viewWeek), 0);

  let html = `<div class="section">
    <div class="context-banner">${ICO_CAL} ${hasSelected ? selectedDishes.length + ' dish' + (selectedDishes.length!==1?'es':'') + ' selected' : 'No dishes selected'}</div>
  </div>`;

  // This Week Panel
  html += `<div class="this-week-panel" style="margin:0 14px 12px">
    <div class="this-week-header${thisWeekCollapsed?' collapsed':''}" onclick="toggleThisWeek()">
      <span style="display:flex;align-items:center;gap:6px">${ICO_PLAN} This Week</span>
      <span class="ico">${thisWeekCollapsed ? ICO_CHEVDN : ICO_CHEVUP}</span>
    </div>`;

  if (!thisWeekCollapsed) {
    html += `<div class="this-week-body">`;
    if (!hasSelected) {
      html += `<div style="padding:16px 14px;color:var(--text-muted);font-size:13px">Select dishes below to build your plan.</div>`;
    } else {
      selectedDishes.forEach(dish => {
        const sv = getDishServings(dish.id, viewWeek);
        html += `<div class="serving-row">
          <span class="name-link" style="font-size:14px;font-weight:600;flex:1" onclick="openDishDetail(${dish.id})">${escHtml(dish.name)}</span>
          ${catBadge(dish.category)}
          <div class="serving-counter">
            <button class="counter-btn" onclick="adjServings(${dish.id},-1)">−</button>
            <input class="counter-val" type="number" min="1" value="${sv}" onchange="setServingsDirect(${dish.id},this.value)" onblur="setServingsDirect(${dish.id},this.value)">
            <button class="counter-btn" onclick="adjServings(${dish.id},1)">+</button>
          </div>
        </div>`;
      });
      html += `<div class="total-servings">Total: ${totalServings} servings</div>`;
    }

    // Replace confirm or generate button
    if (dishReplaceConfirm) {
      html += `<div class="replace-confirm" style="margin:8px 12px">
        <p>This will replace your current cook plan shopping list. Continue?</p>
        <div class="btn-row">
          <button class="btn-primary" onclick="doGenerateShopList()">Yes, Replace</button>
          <button class="btn-secondary" onclick="dishReplaceConfirm=false;render()">Cancel</button>
        </div>
      </div>`;
    } else {
      html += `<div style="padding:10px 12px">
        <button class="btn-primary" style="width:100%;display:flex;align-items:center;justify-content:center;gap:7px" ${!hasSelected?'disabled':''} onclick="tryGenerateShopList()">${ICO_CART} Generate Shopping List</button>
      </div>`;
    }

    html += `</div>`;
  }
  html += `</div>`;

  // Dish list
  html += `<div style="padding:0 14px">
    <div class="filter-chips" style="margin-bottom:10px">
      ${cats.map(c=>`<button class="chip${dishCatFilter===c?' active':''}" onclick="setDishCatFilter('${c}')">${c}</button>`).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:12px;color:var(--text-muted)">${dishes.length} dish${dishes.length!==1?'es':''}</span>
      <button class="btn-primary btn-primary-sm" onclick="openDishModal()">+ Add Dish</button>
    </div>
  </div>`;

  if (dishes.length === 0) {
    html += '<div class="empty-state">No dishes found</div>';
  } else {
    html += '<div class="card tab-list-card">';
    dishes.forEach(dish => {
      const selected = isDishSelected(dish.id, viewWeek);
      html += `<div class="dish-row${selected?' selected':''}" onclick="openDishDetail(${dish.id})">
        <div class="dish-check ico" onclick="toggleDish(${dish.id});event.stopPropagation()" style="cursor:pointer">${selected ? ICO_TICK : ''}</div>
        <div class="dish-info">
          <div class="dish-name">${escHtml(dish.name)}</div>
          <div class="dish-sub">${dish.ingredients.length} ingredient${dish.ingredients.length!==1?'s':''}</div>
        </div>
        ${catBadge(dish.category)}
      </div>`;
    });
    html += '</div>';
  }

  return html;
}

function setDishCatFilter(c) { dishCatFilter = c; confirmDel = null; render(); }
function toggleThisWeek() {
  thisWeekCollapsed = !thisWeekCollapsed;
  thisWeekUserSet = true;
  render();
}

function toggleDish(id) {
  toggleDishSelection(id, viewWeek);
  render();
}

function adjServings(dishId, delta) {
  const cur = getDishServings(dishId, viewWeek);
  setDishServings(dishId, viewWeek, cur + delta);
  render();
}

function setServingsDirect(dishId, val) {
  const n = parseInt(val);
  if (!isNaN(n) && n >= 1) setDishServings(dishId, viewWeek, n);
  render();
}

function tryGenerateShopList() {
  if (db.shoppingList.length > 0) {
    dishReplaceConfirm = true;
    render();
  } else {
    doGenerateShopList();
  }
}

function doGenerateShopList() {
  // Scales each dish's ingredients by (planned servings / dish.baseServings).
  // Matches ingredient names against pantry for stock context (qty, unit, location).
  // Generates a flat shoppingList array — one entry per ingredient across all selected dishes.
  // Ingredients with exclude:true are skipped entirely.
  dishReplaceConfirm = false;
  const wd = getWeekData(viewWeek);
  const newList = [];

  wd.selectedDishes.forEach(dishId => {
    const dish = db.dishes.find(d => d.id === dishId);
    if (!dish) return;
    const servings = wd.dishServings[dishId] || 6;
    const scale = servings / (dish.baseServings || 4);

    dish.ingredients.forEach(ing => {
      if (ing.exclude) return; // user has marked this ingredient as excluded
      const needed = Math.round(ing.qty * scale * 100) / 100;
      const pantryMatch = db.ingredients.find(p => p.name.toLowerCase() === ing.name.toLowerCase());
      newList.push({
        id: nextId(),
        name: ing.name,
        unit: ing.unit,
        needed,
        pantryQty: pantryMatch?.qty || null,
        pantryUnit: pantryMatch?.unit || null,
        pantryLoc: pantryMatch?.loc || null,
        toBuyQty: needed,
        checked: false,
      });
    });
  });

  db.shoppingList = newList;
  saveData();
  switchTab(4);
}

// Dish Detail Modal
function openDishDetail(id) {
  const dish = db.dishes.find(d => d.id === id);
  if (!dish) return;
  const selected = isDishSelected(id, viewWeek);

  // pre-pass to resolve ingredient categories and stock colours
  const plannedServings = getDishServings(id, viewWeek);
  const scale = plannedServings / (dish.baseServings || 4);

  const resolvedCats = dish.ingredients.map(i => {
    const pantryMatch = db.ingredients.find(p => p.name.toLowerCase() === i.name.toLowerCase());
    return pantryMatch?.category || i.category || null;
  });
  const hasCategory = resolvedCats.some(c => c !== null);

  const stockColours = dish.ingredients.map(i => {
    const needed = i.qty * scale;
    const pantryMatch = db.ingredients.find(p => p.name.toLowerCase() === i.name.toLowerCase());
    if (!pantryMatch) return 'var(--red-dark)';
    if (pantryMatch.qty <= 0) return 'var(--red-dark)';
    if (pantryMatch.qty < needed) return 'var(--amber)';
    return null;
  });

  // Resolve pantry item IDs for peek — null if no pantry match
  const pantryIds = dish.ingredients.map(i => {
    const pantryMatch = db.ingredients.find(p => p.name.toLowerCase() === i.name.toLowerCase());
    return pantryMatch ? pantryMatch.id : null;
  });

  // single-pass ## section parser
  function renderNotes(notes) {
    if (!notes) return '';
    return notes.split('\n').map(line => {
      const escaped = escHtml(line);
      if (escaped.startsWith('##')) {
        return `<div class="recipe-section-header">${escaped.slice(2).trim()}</div>`;
      }
      return escaped || '<br>';
    }).join('\n');
  }

  openModal(`
    <div class="recipe-topbar">
      <div class="modal-title" style="margin-bottom:0">${escHtml(dish.name)} ${catBadge(dish.category)}</div>
      <div class="recipe-topbar-actions">
        <button class="btn-icon ico" onclick="openDishModal(${id})" title="Edit">${ICO_EDIT}</button>
        <button class="btn-icon ico-muted" onclick="closeModal()" title="Close">${ICO_CLOSE}</button>
      </div>
    </div>
    <div class="recipe-body">
      <label class="detail-checkbox" style="margin-bottom:14px">
        <input type="checkbox" ${selected?'checked':''} onchange="toggleDish(${id});updateDetailCheckbox(this,${id})">
        Selected for Week of ${fmtDateFull(viewWeek)}
      </label>
      ${dish.notes ? `<div class="detail-section">
        <div class="detail-label">Recipe</div>
        <div class="detail-notes">${renderNotes(dish.notes)}</div>
      </div>` : ''}
      <div class="detail-section">
        <div class="detail-label">Ingredients (${dish.ingredients.length}) · serves ${dish.baseServings || 4} · planning ${plannedServings}</div>
        <table class="detail-ing-table">
          <tbody>
            ${dish.ingredients.map((i, idx) => `<tr>
              <td class="dit-name"${stockColours[idx] ? ` style="color:${stockColours[idx]}"` : ''}>${pantryIds[idx] ? `<span class="name-link" onclick="openPantryPeek(${pantryIds[idx]},${id})">${escHtml(i.name)}</span>` : escHtml(i.name)}</td>
              <td class="dit-qtyunit">${i.qty} <span style="color:var(--text-muted)">${escHtml((i.unit||'').toLowerCase())}</span></td>
              ${hasCategory ? `<td class="dit-cat">${resolvedCats[idx] ? catBadge(resolvedCats[idx]) : ''}</td>` : ''}
              <td style="width:32px;text-align:center"><button class="btn-icon ico" onclick="toggleIngExclude(${id},${idx})" title="${i.exclude ? 'Excluded from shopping list — tap to include' : 'Included in shopping list — tap to exclude'}" style="color:${i.exclude ? '#ccc' : 'var(--green-primary)'}">${ICO_CART}</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `, true);
}

function updateDetailCheckbox(cb, dishId) {
  // Already toggled by toggleDish, just re-render behind the modal
  renderContent();
}

// Flips the exclude flag on a dish ingredient at the given index.
// Excluded ingredients are skipped when generating the shopping list.
// Re-opens the dish detail modal directly to reflect the change.
function toggleIngExclude(dishId, ingIdx) {
  const dish = db.dishes.find(d => d.id === dishId);
  if (!dish || !dish.ingredients[ingIdx]) return;
  dish.ingredients[ingIdx].exclude = !dish.ingredients[ingIdx].exclude;
  saveData();
  openDishDetail(dishId);
}

// Read-only pantry item view opened from dish detail ingredient names.
// Uses a label/value table layout (no input fields) so the read-only
// state is unambiguous. Edit button opens openIngModal with returnDishId
// context so after saving the user lands back on the dish detail.
function openPantryPeek(ingId, dishId) {
  const ing = db.ingredients.find(x => x.id === ingId);
  if (!ing) return;
  function row(label, value) {
    if (!value) return '';
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.6px">${label}</span>
      <span style="font-size:14px;text-align:right">${value}</span>
    </div>`;
  }
  openModal(`
    <div class="modal-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>${escHtml(ing.name)}</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn-icon ico" onclick="openIngModal(${ingId},${dishId})" title="Edit">${ICO_EDIT}</button>
        <button class="btn-icon ico-muted" onclick="closeModal()" title="Close">${ICO_CLOSE}</button>
      </div>
    </div>
    <div style="margin-bottom:16px;height:70vh;overflow-y:auto">
      ${row('Qty', ing.qty != null ? `${ing.qty} ${escHtml((ing.unit||'').toLowerCase())}` : '')}
      ${row('Category', ing.category ? `<span class="badge badge-${({Protein:'protein',Fibre:'fibre',Carbs:'carbs','Dry Goods':'drygds',Condiments:'condiments',Sauces:'sauces',Snacks:'snacks',Drinks:'drinks'}[ing.category]||'grey')}">${ing.category}</span>` : '')}
      ${row('Location', ing.loc ? `<span class="badge ${({'Fridge':'badge-fridge','Freezer':'badge-freezer','Pantry':'badge-pantry'}[ing.loc]||'badge-grey')}">${ing.loc}</span>` : '')}
      ${ing.expiry ? row('Expiry', fmtDateFull(ing.expiry) + (daysUntilExpiry(ing.expiry) < 0 ? ' <span class="badge badge-red">Expired</span>' : daysUntilExpiry(ing.expiry) <= 14 ? ` <span class="badge badge-amber">${daysUntilExpiry(ing.expiry)}d</span>` : '')) : ''}
      ${row('Note', ing.note ? escHtml(ing.note) : '-')}
    </div>
  `);
}

function addDishIng() {
  const container = document.getElementById('dish-ings');
  const i = container.children.length;
  const row = document.createElement('div');
  row.className = 'ing-row';
  row.innerHTML = `
    <input class="form-input" placeholder="Ingredient name" value="">
    <input class="form-input qty" type="number" step="0.01" placeholder="Qty" value="">
    ${unitComboHtml('ing-unit-'+i, '')}
    <button class="remove-ing" onclick="removeDishIng(this)">${ICO_REMOVE}</button>`;
  container.appendChild(row);
}

function removeDishIng(btn) {
  const row = btn.closest('.ing-row');
  if (document.getElementById('dish-ings').children.length > 1) row.remove();
}

function startDishDelete(id) {
  dishDeleteConfirm = true;
  openDishModal(id);
}

function cancelDishDelete(id) {
  dishDeleteConfirm = false;
  openDishModal(id);
}

function confirmDeleteDish(id) {
  dishDeleteConfirm = false;
  id = Number(id);
  db.dishes = db.dishes.filter(x => x.id !== id);
  saveData();
  closeModal();
  render();
}

// Saves a dish (add or edit). When editing, preserves the exclude flag on each
// ingredient record — the flag is not surfaced in the edit form so must be
// carried forward from the existing data to avoid losing toggle state.
function saveDish(id) {
  const name = document.getElementById('dish-name').value.trim();
  if (!name) return alert('Dish name is required');
  const existingDish = id ? db.dishes.find(d => d.id === id) : null;
  const ingRows = document.querySelectorAll('#dish-ings .ing-row');
  const ingredients = [];
  ingRows.forEach((row, idx) => {
    const inputs = row.querySelectorAll('input');
    const n = inputs[0].value.trim();
    const unitVal = inputs[2].value.trim();
    if (n) {
      saveCustomUnit(unitVal);
      // Preserve the exclude flag from the existing ingredient at the same index
      const existingExclude = existingDish?.ingredients[idx]?.exclude || false;
      ingredients.push({ name: n, qty: parseFloat(inputs[1].value)||0, unit: unitVal.toLowerCase(), exclude: existingExclude });
    }
  });
  const obj = {
    id: id || nextId(),
    name,
    category: document.getElementById('dish-cat').value,
    baseServings: parseInt(document.getElementById('dish-serves').value) || 4,
    notes: document.getElementById('dish-notes').value.trim(),
    ingredients,
  };
  if (id) {
    const idx = db.dishes.findIndex(x => x.id === id);
    db.dishes[idx] = obj;
  } else {
    db.dishes.push(obj);
  }
  saveData();
  if (id) {
    render();
    openDishDetail(id);
  } else {
    closeModal();
    render();
  }
}
